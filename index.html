<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NITRO RUSH 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{overflow:hidden;background:#000;font-family:'Exo 2',sans-serif;color:#fff;}
#c{display:block;width:100vw;height:100vh;}

/* ── HUD ── */
#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none;}
.hp{position:absolute;background:rgba(2,6,18,.82);border:1px solid rgba(0,229,255,.18);
  backdrop-filter:blur(10px);padding:12px 16px;}
#htl{top:16px;left:16px;}
#htr{top:16px;right:16px;text-align:right;}
#hbl{bottom:20px;left:16px;}
.hl{font-family:'Orbitron',sans-serif;font-size:.48rem;letter-spacing:.22em;
  color:rgba(0,229,255,.4);margin-bottom:2px;text-transform:uppercase;}
.hv{font-family:'Orbitron',sans-serif;font-size:1.5rem;font-weight:900;
  color:#00e5ff;line-height:1.1;}
.hv.sm{font-size:.9rem;}
.hv.g{color:#ffd600;}
.hv.r{color:#ff1744;}
.bar-wrap{margin-top:8px;width:155px;}
.bar-lbl{font-family:'Orbitron',sans-serif;font-size:.48rem;letter-spacing:.12em;
  color:#334;margin-bottom:3px;display:flex;justify-content:space-between;}
.bar-bg{height:7px;background:#0a1020;border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;transition:width .1s;}
#nbar{background:linear-gradient(90deg,#ffd600,#ff6d00);}
#hbar{background:linear-gradient(90deg,#ff1744,#ff6d00);}
#spd-ring{position:absolute;bottom:20px;right:20px;width:110px;height:110px;}
#minimap-c{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
  width:100px;height:100px;border-radius:50%;border:1px solid rgba(0,229,255,.3);}
#lapfl{position:absolute;top:44%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',sans-serif;font-size:clamp(1.2rem,3vw,2rem);font-weight:900;
  color:#ffd600;text-shadow:0 0 30px #ffd600;opacity:0;pointer-events:none;
  white-space:nowrap;z-index:20;transition:opacity .3s;text-align:center;}
#gearbox{position:absolute;bottom:22px;right:140px;
  font-family:'Orbitron',sans-serif;font-size:2.5rem;font-weight:900;
  color:rgba(0,229,255,.9);text-shadow:0 0 20px rgba(0,229,255,.5);}
/* pause btn */
#pausebtn{pointer-events:auto;position:absolute;top:16px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.5);border:1px solid rgba(0,229,255,.2);
  color:rgba(0,229,255,.6);font-family:'Orbitron',sans-serif;
  font-size:.58rem;letter-spacing:.15em;padding:8px 20px;cursor:pointer;}

/* ── COUNTDOWN ── */
#cd{position:fixed;inset:0;z-index:40;display:none;
  align-items:center;justify-content:center;pointer-events:none;}
#cdn{font-family:'Orbitron',sans-serif;font-weight:900;
  color:#00e5ff;text-shadow:0 0 80px #00e5ff;
  animation:cdpop .9s ease-out forwards;}
@keyframes cdpop{0%{transform:scale(3);opacity:0}20%{opacity:1}80%{transform:scale(1);opacity:1}100%{transform:scale(.3);opacity:0}}

/* ── SCREENS ── */
.scr{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:center;transition:opacity .5s,transform .5s;}
.scr.off{opacity:0;pointer-events:none;transform:scale(.97);}
#sMenu{background:radial-gradient(ellipse at 50% 40%,#060d20 0%,#020509 100%);}
.logo{font-family:'Orbitron',sans-serif;font-size:clamp(2.8rem,9vw,6rem);font-weight:900;
  background:linear-gradient(135deg,#00e5ff 0%,#0080ff 35%,#ff1744 65%,#ffd600 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;letter-spacing:-.02em;text-align:center;
  filter:drop-shadow(0 0 40px rgba(0,229,255,.35));}
.logo-sub{font-family:'Orbitron',sans-serif;font-size:clamp(.5rem,1.4vw,.8rem);
  letter-spacing:.5em;color:rgba(0,229,255,.45);margin-top:10px;text-align:center;}
.mnav{display:flex;flex-direction:column;gap:12px;width:280px;margin-top:48px;}
.mb{font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;
  letter-spacing:.2em;padding:15px 30px;border:0;cursor:pointer;
  clip-path:polygon(12px 0,100% 0,calc(100% - 12px) 100%,0 100%);
  transition:transform .15s,filter .15s;}
.mb:hover{transform:translateX(6px);filter:brightness(1.2);}
.mb.p{background:linear-gradient(90deg,#00e5ff,#0070e0);color:#000;}
.mb.s{background:linear-gradient(90deg,#0d1a2a,#162030);color:#00e5ff;
  border:1px solid rgba(0,229,255,.25);}
.mb.d{background:linear-gradient(90deg,#200a10,#160510);color:#ff1744;
  border:1px solid rgba(255,23,68,.25);}
.ov{position:fixed;inset:0;z-index:31;background:rgba(2,5,16,.96);
  backdrop-filter:blur(14px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
  transition:opacity .4s,transform .4s;}
.ov.off{opacity:0;pointer-events:none;transform:translateY(16px);}
.ov-title{font-family:'Orbitron',sans-serif;font-size:clamp(1.1rem,2.8vw,1.7rem);
  font-weight:900;letter-spacing:.25em;color:#00e5ff;margin-bottom:28px;
  text-shadow:0 0 20px rgba(0,229,255,.5);}
/* track cards */
.tgrid{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;max-width:820px;}
.tcard{width:230px;background:rgba(6,12,26,.92);border:1px solid rgba(0,229,255,.12);
  cursor:pointer;transition:all .22s;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,14px 100%,0 calc(100% - 14px));}
.tcard:hover,.tcard.sel{border-color:#00e5ff;box-shadow:0 0 25px rgba(0,229,255,.18);}
.tcard.sel::after{content:'✓ SELECTED';position:absolute;top:7px;right:7px;
  font-family:'Orbitron',sans-serif;font-size:.5rem;background:#00e5ff;
  color:#000;padding:2px 7px;font-weight:700;}
.tcard{position:relative;}
.tprev{width:100%;height:120px;display:block;}
.tcinfo{padding:14px;}
.tcname{font-family:'Orbitron',sans-serif;font-size:.85rem;font-weight:700;margin-bottom:5px;}
.tcdiff{font-size:.72rem;font-weight:700;letter-spacing:.1em;margin-bottom:7px;}
.de{color:#76ff03;}.dm{color:#ffd600;}.dh{color:#ff1744;}
.tcmeta{font-size:.72rem;color:#445;display:flex;justify-content:space-between;}
/* car cards */
.cgrid{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:900px;}
.ccard{width:165px;background:rgba(6,12,26,.92);border:1px solid rgba(255,255,255,.07);
  padding:14px;cursor:pointer;transition:all .22s;text-align:center;}
.ccard:hover,.ccard.sel{border-color:#ffd600;box-shadow:0 0 20px rgba(255,214,0,.12);}
.ccard.sel::before{content:'SELECTED';position:absolute;top:-1px;left:0;right:0;
  font-family:'Orbitron',sans-serif;font-size:.48rem;background:#ffd600;
  color:#000;padding:2px;font-weight:700;text-align:center;}
.ccard{position:relative;}
.ccvs{display:block;margin:0 auto 10px;width:145px;height:75px;}
.ccname{font-family:'Orbitron',sans-serif;font-size:.68rem;font-weight:700;
  margin-bottom:10px;color:#ccc;}
.srow{display:flex;align-items:center;gap:5px;margin:4px 0;}
.slbl{font-size:.58rem;color:#445;width:46px;text-align:right;letter-spacing:.04em;}
.str{flex:1;height:4px;background:#0a1220;border-radius:2px;overflow:hidden;}
.sfill{height:100%;border-radius:2px;transition:width .35s;}
/* modal */
.modal{position:fixed;inset:0;z-index:35;background:rgba(2,4,14,.9);
  backdrop-filter:blur(18px);display:flex;flex-direction:column;
  align-items:center;justify-content:center;transition:opacity .3s;}
.modal.off{opacity:0;pointer-events:none;}
.mtitle{font-family:'Orbitron',sans-serif;font-size:clamp(1.4rem,3.5vw,2.2rem);
  font-weight:900;margin-bottom:28px;}
.mbtns{display:flex;flex-direction:column;gap:12px;width:250px;margin-top:8px;}
/* podium */
.podium{display:flex;align-items:flex-end;gap:10px;margin:20px 0;}
.pod{text-align:center;padding:18px 24px;border:1px solid #1a2030;}
.pod.p1{background:linear-gradient(180deg,rgba(255,214,0,.1),rgba(255,214,0,.02));
  border-color:rgba(255,214,0,.4);min-height:120px;}
.pod.p2{background:linear-gradient(180deg,rgba(200,200,200,.07),transparent);
  border-color:rgba(200,200,200,.25);min-height:90px;}
.pod.p3{background:linear-gradient(180deg,rgba(205,127,50,.07),transparent);
  border-color:rgba(205,127,50,.25);min-height:70px;}
.prank{font-family:'Orbitron',sans-serif;font-size:2.2rem;font-weight:900;line-height:1;}
.pname{font-size:.8rem;font-weight:700;margin-top:6px;}
.ptime{font-family:'Orbitron',sans-serif;font-size:.62rem;color:#445;margin-top:2px;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:6px 0;}
.rbox{background:rgba(6,12,26,.85);border:1px solid rgba(0,229,255,.1);
  padding:12px 18px;text-align:center;}
.rlbl{font-size:.62rem;letter-spacing:.14em;color:#334;text-transform:uppercase;margin-bottom:3px;}
.rval{font-family:'Orbitron',sans-serif;font-size:1.1rem;font-weight:700;color:#00e5ff;}
.sep{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,.25),transparent);margin:18px 0;}
/* mobile */
#mctrl{position:fixed;bottom:0;left:0;right:0;height:185px;z-index:20;pointer-events:none;display:none;}
#mctrl.show{display:block;}
.mbtn2{position:absolute;width:60px;height:60px;border-radius:50%;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
  pointer-events:auto;user-select:none;-webkit-user-select:none;transition:background .1s;}
.mbtn2.act{background:rgba(0,229,255,.25);border-color:#00e5ff;}
#mup{bottom:110px;left:34px;}
#mdn{bottom:32px;left:34px;}
#mlt{bottom:70px;left:calc(50% - 165px);}
#mrt{bottom:70px;left:calc(50% - 100px);}
#mnt{bottom:26px;left:50%;transform:translateX(-50%);width:78px;height:78px;
  background:rgba(255,214,0,.12);border-color:rgba(255,214,0,.45);
  font-family:'Orbitron',sans-serif;font-size:.58rem;font-weight:900;
  color:#ffd600;letter-spacing:.08em;}
#mnt.act{background:rgba(255,214,0,.32);}
@media(max-width:600px){
  .tgrid,.cgrid{gap:10px;}
  .tcard{width:88vw;max-width:290px;}
  .ccard{width:138px;}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hp" id="htl">
    <div class="hl">LAP</div><div class="hv" id="h-lap">1/3</div>
    <div class="hl" style="margin-top:7px;">LAP TIME</div><div class="hv sm" id="h-lt">0:00.0</div>
    <div class="hl" style="margin-top:4px;">BEST LAP</div><div class="hv sm g" id="h-bl">--:--.-</div>
  </div>
  <div class="hp" id="htr">
    <div class="hl">POSITION</div><div class="hv g" id="h-pos">1st</div>
    <div class="hl" style="margin-top:7px;">TOTAL TIME</div><div class="hv sm" id="h-tt">0:00</div>
  </div>
  <div class="hp" id="hbl">
    <div class="hl">SPEED</div>
    <div class="hv" id="h-spd">0 <span style="font-size:.52rem;font-weight:400;">km/h</span></div>
    <div class="bar-wrap">
      <div class="bar-lbl"><span>NITRO</span><span id="h-np">100%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="nbar" style="width:100%"></div></div>
    </div>
    <div class="bar-wrap" style="margin-top:5px;">
      <div class="bar-lbl"><span>HP</span><span id="h-hp">100%</span></div>
      <div class="bar-bg"><div class="bar-fill" id="hbar" style="width:100%"></div></div>
    </div>
  </div>
  <!-- Speedometer canvas -->
  <canvas id="spd-ring" width="110" height="110"></canvas>
  <canvas id="minimap-c" width="100" height="100"></canvas>
  <div id="lapfl"></div>
  <div id="gearbox">1</div>
  <button id="pausebtn" onclick="pauseGame()">⏸ PAUSE</button>
</div>

<!-- COUNTDOWN -->
<div id="cd"><div id="cdn" style="font-size:12rem;">3</div></div>

<!-- MAIN MENU -->
<div class="scr" id="sMenu">
  <div class="logo">NITRO<br>RUSH 3D</div>
  <div class="logo-sub">Championship Street Racing</div>
  <div class="mnav">
    <button class="mb p" onclick="openTrack()">▶&nbsp;&nbsp;RACE NOW</button>
    <button class="mb s" onclick="openCar()">🚗&nbsp;&nbsp;GARAGE</button>
    <button class="mb s" onclick="showHelp()">⌨&nbsp;&nbsp;HOW TO PLAY</button>
  </div>
  <div style="position:absolute;bottom:18px;font-family:'Orbitron',sans-serif;
    font-size:.45rem;letter-spacing:.3em;color:#111820;">V3.0 THREE.JS EDITION</div>
</div>

<!-- TRACK SELECT -->
<div class="ov off" id="sTrack">
  <div class="ov-title">SELECT TRACK</div>
  <div class="tgrid" id="tgrid"></div>
  <div class="sep"></div>
  <div style="display:flex;gap:14px;">
    <button class="mb s" onclick="closeOv('sTrack')">← BACK</button>
    <button class="mb p" onclick="openCar()">CHOOSE CAR →</button>
  </div>
</div>

<!-- CAR SELECT -->
<div class="ov off" id="sCar">
  <div class="ov-title">SELECT CAR</div>
  <div class="cgrid" id="cgrid"></div>
  <div class="sep"></div>
  <div style="display:flex;gap:14px;">
    <button class="mb s" onclick="closeOv('sCar')">← BACK</button>
    <button class="mb p" onclick="beginRace()">🏁 START RACE</button>
  </div>
</div>

<!-- PAUSE -->
<div class="modal off" id="mPause">
  <div class="mtitle" style="color:#ff1744;">⏸ PAUSED</div>
  <div class="mbtns">
    <button class="mb p" onclick="resumeGame()">▶ RESUME</button>
    <button class="mb s" onclick="restartRace()">↺ RESTART</button>
    <button class="mb d" onclick="quitMenu()">✕ QUIT TO MENU</button>
  </div>
</div>

<!-- RESULTS -->
<div class="modal off" id="mResults">
  <div class="mtitle" style="color:#ffd600;">🏁 RACE COMPLETE</div>
  <div class="podium" id="podium"></div>
  <div class="rgrid" id="rstats"></div>
  <div style="display:flex;gap:12px;margin-top:14px;">
    <button class="mb s" onclick="restartRace()">↺ RETRY</button>
    <button class="mb p" onclick="quitMenu()">MENU</button>
  </div>
</div>

<!-- MOBILE -->
<div id="mctrl">
  <div class="mbtn2" id="mup">▲</div>
  <div class="mbtn2" id="mdn">▼</div>
  <div class="mbtn2" id="mlt">◀</div>
  <div class="mbtn2" id="mrt">▶</div>
  <div class="mbtn2" id="mnt">NITRO</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

// ═══════════════════════════════════════════════════════
// 3D CAR BUILDER
// ═══════════════════════════════════════════════════════
function buildCarMesh(hexColor, bodyHex){
  const grp=new THREE.Group();

  // Body
  const bodyGeo=new THREE.BoxGeometry(2.2,0.5,4.2);
  const bodyMat=new THREE.MeshStandardMaterial({color:hexColor,roughness:.3,metalness:.7,
    emissive:hexColor,emissiveIntensity:.08});
  const body=new THREE.Mesh(bodyGeo,bodyMat);
  body.position.y=0.5;
  body.castShadow=true;
  grp.add(body);

  // Cabin
  const cabinGeo=new THREE.BoxGeometry(1.8,0.45,2.2);
  const cabinMat=new THREE.MeshStandardMaterial({color:bodyHex,roughness:.4,metalness:.6,
    emissive:bodyHex,emissiveIntensity:.05});
  const cabin=new THREE.Mesh(cabinGeo,cabinMat);
  cabin.position.set(0,.85,-.2);
  cabin.castShadow=true;
  grp.add(cabin);

  // Windshield tint
  const wGeo=new THREE.BoxGeometry(1.6,.35,0.05);
  const wMat=new THREE.MeshStandardMaterial({color:0x88ddff,transparent:true,opacity:.5,
    roughness:0,metalness:.1});
  const wind=new THREE.Mesh(wGeo,wMat);
  wind.position.set(0,.85,.9);
  grp.add(wind);

  // Rear window
  const rwMesh=new THREE.Mesh(wGeo.clone(),wMat);
  rwMesh.position.set(0,.85,-1.3);
  grp.add(rwMesh);

  // Wheels (4)
  const whlGeo=new THREE.CylinderGeometry(.42,.42,.28,12);
  const whlMat=new THREE.MeshStandardMaterial({color:0x111111,roughness:.9,metalness:.1});
  const rimMat=new THREE.MeshStandardMaterial({color:0xcccccc,roughness:.2,metalness:.9});
  const rimGeo=new THREE.CylinderGeometry(.25,.25,.3,8);
  [[-1.15,0,1.4],[1.15,0,1.4],[-1.15,0,-1.4],[1.15,0,-1.4]].forEach(([wx,wy,wz])=>{
    const wg=new THREE.Group();
    const whl=new THREE.Mesh(whlGeo,whlMat);
    whl.rotation.z=Math.PI/2;
    whl.castShadow=true;
    const rim=new THREE.Mesh(rimGeo,rimMat);
    rim.rotation.z=Math.PI/2;
    wg.add(whl);wg.add(rim);
    wg.position.set(wx,wy,wz);
    grp.add(wg);
    wg._isWheel=true;
  });

  // Headlights
  const hlGeo=new THREE.BoxGeometry(.35,.15,.08);
  const hlMat=new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:3,roughness:0});
  [-0.6,0.6].forEach(hx=>{
    const hl=new THREE.Mesh(hlGeo,hlMat);
    hl.position.set(hx,.55,2.1);
    grp.add(hl);
    // Point light for headlight glow
    const pl=new THREE.PointLight(0xffeedd,.8,8);
    pl.position.set(hx,.55,2.4);
    grp.add(pl);
  });

  // Taillights
  const tlMat=new THREE.MeshStandardMaterial({color:0xff1744,emissive:0xff1744,emissiveIntensity:2,roughness:0});
  [-0.6,0.6].forEach(tx=>{
    const tl=new THREE.Mesh(new THREE.BoxGeometry(.3,.12,.08),tlMat);
    tl.position.set(tx,.52,-2.1);
    grp.add(tl);
  });

  // Nitro exhaust glow (hidden by default)
  const exGlow=new THREE.PointLight(0xff6d00,0,5);
  exGlow.position.set(0,.4,-2.3);
  grp.add(exGlow);
  grp._exhaust=exGlow;

  // Shadow plane under car
  const shGeo=new THREE.PlaneGeometry(2.8,5);
  const shMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.35,depthWrite:false});
  const sh=new THREE.Mesh(shGeo,shMat);
  sh.rotation.x=-Math.PI/2;
  sh.position.y=.02;
  grp.add(sh);

  grp._color=hexColor;
  return grp;
}

// ═══════════════════════════════════════════════════════
// TRACK BUILDER
// ═══════════════════════════════════════════════════════
function buildTrack(track){
  const grp=new THREE.Group();

  // Ground plane
  const groundGeo=new THREE.PlaneGeometry(400,400);
  const groundMat=new THREE.MeshStandardMaterial({color:track.groundClr,roughness:1,metalness:0});
  const ground=new THREE.Mesh(groundGeo,groundMat);
  ground.rotation.x=-Math.PI/2;
  ground.receiveShadow=true;
  grp.add(ground);

  // Road segments
  const roadMat=new THREE.MeshStandardMaterial({color:track.roadClr,roughness:.85,metalness:0});
  const curbMat=new THREE.MeshStandardMaterial({color:track.curbClr,roughness:.6,metalness:.2,
    emissive:track.curbClr,emissiveIntensity:.15});

  track.segs.forEach(s=>{
    // Road surface
    const rg=new THREE.BoxGeometry(s.w,0.12,s.d);
    const rm=new THREE.Mesh(rg,roadMat);
    rm.position.set(s.x,.06,s.z);
    rm.receiveShadow=true;
    grp.add(rm);

    // Curb strips (left/right edges)
    const curbH=0.2;
    const curbW=0.5;
    if(s.w>s.d){
      // Horizontal segment — curbs on front/back edges (Z)
      [s.z-s.d/2,s.z+s.d/2].forEach(cz=>{
        const cg=new THREE.BoxGeometry(s.w,curbH,curbW);
        const cm=new THREE.Mesh(cg,curbMat);
        cm.position.set(s.x,curbH/2,cz);
        grp.add(cm);
      });
      // Center dashes
      for(let dx=-s.w/2+5;dx<s.w/2;dx+=8){
        const dg=new THREE.BoxGeometry(4,.13,.3);
        const dm=new THREE.Mesh(dg,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.2}));
        dm.position.set(s.x+dx,.13,s.z);
        grp.add(dm);
      }
    } else {
      // Vertical segment — curbs on left/right edges (X)
      [s.x-s.w/2,s.x+s.w/2].forEach(cx=>{
        const cg=new THREE.BoxGeometry(curbW,curbH,s.d);
        const cm=new THREE.Mesh(cg,curbMat);
        cm.position.set(cx,curbH/2,s.z);
        grp.add(cm);
      });
      for(let dz=-s.d/2+5;dz<s.d/2;dz+=8){
        const dg=new THREE.BoxGeometry(.3,.13,4);
        const dm=new THREE.Mesh(dg,new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.2}));
        dm.position.set(s.x,.13,s.z+dz);
        grp.add(dm);
      }
    }
  });

  // Finish line (checkered)
  const flZone=track.finishZone;
  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++){
      const fg=new THREE.BoxGeometry(1.4,0.14,1.4);
      const fm=new THREE.MeshBasicMaterial({color:(i+j)%2===0?0xffffff:0x000000});
      const f=new THREE.Mesh(fg,fm);
      f.position.set(flZone.x-2.8+i*1.4+.7,.07,flZone.z-2.8+j*1.4+.7);
      grp.add(f);
    }
  }

  // Decorations
  track.decorations.forEach(d=>buildDecoration(grp,d,track));

  // Lights
  buildLighting(grp,track);

  return grp;
}

function buildDecoration(grp,d,track){
  if(d.type==='building'){
    const h=d.h||20;
    const geo=new THREE.BoxGeometry(8+Math.random()*6,h,8+Math.random()*6);
    const clr=new THREE.Color(track.skyClr).lerp(new THREE.Color(0x334466),.5);
    const mat=new THREE.MeshStandardMaterial({color:clr,roughness:.7,metalness:.2,
      emissive:clr,emissiveIntensity:.05});
    const m=new THREE.Mesh(geo,mat);
    m.position.set(d.x,h/2,d.z||0);
    m.castShadow=true;
    grp.add(m);
    // Windows
    for(let wi=0;wi<Math.floor(h/4);wi++){
      for(let wj=0;wj<3;wj++){
        if(Math.random()>.4){
          const wg=new THREE.BoxGeometry(.8,.6,.05);
          const wm=new THREE.MeshBasicMaterial({color:0xffffcc,transparent:true,opacity:.7});
          const wnd=new THREE.Mesh(wg,wm);
          wnd.position.set(d.x-2+wj*2,2+wi*4,(d.z||0)+4.05);
          grp.add(wnd);
        }
      }
    }
  } else if(d.type==='tree'){
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.2,.3,2,6),
      new THREE.MeshStandardMaterial({color:0x4a3000,roughness:1}));
    trunk.position.set(d.x,1,d.z||0);
    const top=new THREE.Mesh(new THREE.CylinderGeometry(0,1.5*(d.s||1),3*(d.s||1),7),
      new THREE.MeshStandardMaterial({color:0x1a5c1a,roughness:.9,emissive:0x0a2a0a,emissiveIntensity:.1}));
    top.position.set(d.x,3*(d.s||1),d.z||0);
    grp.add(trunk);grp.add(top);
  } else if(d.type==='cactus'){
    const body=new THREE.Mesh(new THREE.CylinderGeometry(.3,.4,3*(d.s||1),8),
      new THREE.MeshStandardMaterial({color:0x2d5a1b,roughness:.9}));
    body.position.set(d.x,1.5*(d.s||1),d.z||0);
    grp.add(body);
  } else if(d.type==='rock'){
    const rock=new THREE.Mesh(new THREE.DodecahedronGeometry(1.5*(d.s||1),.5),
      new THREE.MeshStandardMaterial({color:0x666655,roughness:1}));
    rock.position.set(d.x,.8,d.z||0);
    grp.add(rock);
  } else if(d.type==='lamp'){
    const post=new THREE.Mesh(new THREE.CylinderGeometry(.1,.1,8,6),
      new THREE.MeshStandardMaterial({color:0x888888,roughness:.5,metalness:.8}));
    post.position.set(d.x,4,d.z||0);
    const head=new THREE.Mesh(new THREE.BoxGeometry(1,.3,1),
      new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffcc,emissiveIntensity:2}));
    head.position.set(d.x,8.1,d.z||0);
    grp.add(post);grp.add(head);
    const pl=new THREE.PointLight(0xffffcc,1.5,20);
    pl.position.set(d.x,8,d.z||0);
    pl.castShadow=true;
    grp.add(pl);
  }
}

function buildLighting(grp,track){
  // Ambient
  const amb=new THREE.AmbientLight(0x334466,.8);
  grp.add(amb);
  // Directional (sun/moon)
  const dir=new THREE.DirectionalLight(0xffffff,1.2);
  dir.position.set(50,80,30);
  dir.castShadow=true;
  dir.shadow.mapSize.set(2048,2048);
  dir.shadow.camera.near=1;
  dir.shadow.camera.far=300;
  dir.shadow.camera.left=-120;dir.shadow.camera.right=120;
  dir.shadow.camera.top=120;dir.shadow.camera.bottom=-120;
  grp.add(dir);
  // Hemisphere sky/ground
  const hemi=new THREE.HemisphereLight(
    new THREE.Color(track.skyClr).lerp(new THREE.Color(0x224488),.3),
    new THREE.Color(track.groundClr),
    .5
  );
  grp.add(hemi);
}

// ═══════════════════════════════════════════════════════
// PARTICLE SYSTEM
// ═══════════════════════════════════════════════════════
class ParticleSystem{
  constructor(){
    this.particles=[];
    this.meshes=[];
    // Pool
    this._geo=new THREE.SphereGeometry(.12,4,4);
  }
  spawn(x,y,z,vx,vy,vz,clr,life,size){
    const mat=new THREE.MeshBasicMaterial({color:clr,transparent:true,opacity:1});
    const m=new THREE.Mesh(this._geo,mat);
    m.scale.setScalar(size||1);
    m.position.set(x,y,z);
    scene.add(m);
    this.particles.push({m,vx,vy,vz,life,maxLife:life,size:size||1});
    this.meshes.push(m);
  }
  spawnNitro(x,y,z,angle){
    for(let i=0;i<5;i++){
      const a=angle+Math.PI+(Math.random()-.5)*.6;
      const sp=4+Math.random()*8;
      const clr=new THREE.Color().setHSL(.08+Math.random()*.06,1,.55+Math.random()*.2);
      this.spawn(x,y+.3,z, Math.sin(a)*sp,(.5+Math.random())*.5,-Math.cos(a)*sp,
        clr,.4,.3+Math.random()*.2);
    }
  }
  spawnSparks(x,y,z,clr){
    for(let i=0;i<10;i++){
      const a=Math.random()*Math.PI*2, el=(Math.random()-.5)*Math.PI;
      const sp=3+Math.random()*6;
      this.spawn(x,y,z, Math.cos(a)*Math.cos(el)*sp,.5+Math.random()*2,Math.sin(a)*Math.cos(el)*sp,
        clr,.6,.2);
    }
  }
  update(dt){
    for(let i=this.particles.length-1;i>=0;i--){
      const p=this.particles[i];
      p.life-=dt;
      if(p.life<=0){
        scene.remove(p.m);
        p.m.geometry.dispose&&undefined;
        p.m.material.dispose();
        this.particles.splice(i,1);
        continue;
      }
      const t=p.life/p.maxLife;
      p.m.position.x+=p.vx*dt;
      p.m.position.y+=p.vy*dt;
      p.m.position.z+=p.vz*dt;
      p.vy-=9.8*dt;
      p.vx*=.92;p.vz*=.92;
      p.m.material.opacity=t*.9;
      p.m.scale.setScalar(p.size*t);
    }
  }
  clear(){
    this.particles.forEach(p=>scene.remove(p.m));
    this.particles=[];
  }
}
const PS=new ParticleSystem();

// RACE INIT
// ═══════════════════════════════════════════════════════
function beginRace(){
  closeOv('sCar'); closeOv('sTrack');
  document.getElementById('sMenu').classList.add('off');
  startRace();
}

function startRace(){
  // Clear scene
  while(scene.children.length) scene.remove(scene.children[0]);
  PS.clear();

  const tDef=TRACKS[selTrack];
  const cDef=CARS_DATA[selCar];

  // Fog
  scene.fog=new THREE.FogExp2(tDef.fogClr,.012);
  scene.background=new THREE.Color(tDef.skyClr);

  // Build track
  const trackMesh=buildTrack(tDef);
  scene.add(trackMesh);

  // Build player car
  const playerMesh=buildCarMesh(cDef.hex,cDef.body);
  scene.add(playerMesh);

  // Build AI cars
  const aiMeshes=AI_DEFS.map(a=>buildCarMesh(a.hex,a.body));
  aiMeshes.forEach(m=>scene.add(m));

  // Skid mark material
  const skidMat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.5,depthWrite:false});

  // Place cars
  const mkCar=(mesh,x,z,angle,def,isP,aiDef,idx)=>{
    mesh.position.set(x,0,z);
    mesh.rotation.y=angle;
    return {
      mesh, x, z, angle,
      speed:0, maxSpd:def.maxSpd*(isP?1:.7+Math.random()*.2),
      accel:def.accel*(isP?1:.68),
      turn:def.turn,
      hp:def.maxHP, maxHP:def.maxHP,
      nitro:100, nitroCooldown:0,
      lap:1, cpIdx:0,
      lapStart:0, lapTimes:[], bestLap:Infinity,
      isPlayer:isP,
      name:isP?'YOU':(aiDef?aiDef.name:'AI'),
      color:isP?cDef.hex:(aiDef?aiDef.hex:0xffffff),
      wpIdx:0,
      finished:false, finishPos:0,
      _stuckCheck:{x,z,t:0},
      _wheels:mesh.children.filter(c=>c._isWheel),
      skids:[],
      _lastSkid:null,
    };
  };

  const ang=tDef.startAngle;
  const player=mkCar(playerMesh,tDef.startX,tDef.startZ,ang,cDef,true,null,0);
  const aiCars=AI_DEFS.map((ai,i)=>{
    const off=tDef.aiOffsets[i];
    const bx=-Math.sin(ang)*Math.abs(off.dx);
    const bz=-Math.cos(ang)*Math.abs(off.dx);
    const side=(i%2===0?1:-1)*3;
    const sx=-Math.cos(ang)*side; // perpendicular
    const sz=Math.sin(ang)*side;
    return mkCar(aiMeshes[i],tDef.startX+bx+sx,tDef.startZ+bz+sz,ang,cDef,false,ai,i+1);
  });

  rd={
    tDef, player, aiCars,
    allCars:[player,...aiCars],
    trackMesh, skidMat,
    startTime:0, shake:0,
    finishOrder:[], finished:false,
  };

  document.getElementById('hud').style.display='block';
  if(isMob()) document.getElementById('mctrl').classList.add('show');
  doCountdown();
}

// ═══════════════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════════════
function doCountdown(){
  gState='countdown';
  const el=document.getElementById('cd');
  const num=document.getElementById('cdn');
  el.style.display='flex';
  let n=3;
  const tick=()=>{
    if(n===0){num.style.fontSize='8rem';num.style.color='#76ff03';num.style.textShadow='0 0 80px #76ff03';num.textContent='GO!';}
    else{num.style.fontSize='12rem';num.style.color='#00e5ff';num.style.textShadow='0 0 80px #00e5ff';num.textContent=n;}
    num.style.animation='none';void num.offsetWidth;num.style.animation='cdpop .9s ease-out forwards';
    if(n<0){
      el.style.display='none'; gState='racing';
      const now=performance.now();
      rd.startTime=now;
      rd.allCars.forEach(c=>c.lapStart=now);
      lastT=now;
      if(!raf) raf=requestAnimationFrame(loop);
      return;
    }
    n--; setTimeout(tick,900);
  };
  tick();
}

// ═══════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════
function loop(ts){
  if(gState==='paused'||gState==='results'||gState==='menu'){raf=null;return;}
  const dt=Math.min((ts-lastT)/1000,.05);
  lastT=ts;
  if(gState==='racing'&&rd){
    updateRace(dt,ts);
    renderScene(ts);
    updateHUD(ts);
  }
  raf=requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════
function isOnRoad(x,z){
  for(const s of rd.tDef.segs){
    if(x>=s.x-s.w/2&&x<=s.x+s.w/2&&z>=s.z-s.d/2&&z<=s.z+s.d/2) return true;
  }
  return false;
}

function updateRace(dt,ts){
  updatePlayer(dt,ts);
  rd.aiCars.forEach(ai=>updateAI(ai,dt,ts));
  PS.update(dt);
  if(rd.shake>0) rd.shake-=dt*12;
}

function updatePlayer(dt,ts){
  const c=rd.player;
  const up=keys.up, dn=keys.dn, lt=keys.lt, rt=keys.rt, nt=keys.nitro;

  // Nitro
  let sm=1;
  if(nt&&c.nitro>0&&!c.finished){
    c.nitro=Math.max(0,c.nitro-28*dt); sm=1.7;
    PS.spawnNitro(c.x,0,c.z,c.angle);
    c.mesh._exhaust.intensity=2+Math.random();
    if(c.nitro===0) c.nitroCooldown=2;
  } else {
    c.mesh._exhaust.intensity*=.85;
    if(c.nitroCooldown>0) c.nitroCooldown-=dt;
    else c.nitro=Math.min(100,c.nitro+18*dt);
  }

  const ms=c.maxSpd*sm;
  if(up) c.speed=Math.min(c.speed+c.accel*dt,ms);
  else if(dn) c.speed=Math.max(c.speed-c.accel*1.6*dt,-ms*.35);
  else {
    if(c.speed>0) c.speed=Math.max(0,c.speed-18*dt);
    else c.speed=Math.min(0,c.speed+18*dt);
  }

  if(Math.abs(c.speed)>.5){
    const tf=Math.min(1,Math.abs(c.speed)/c.maxSpd)*1.1;
    c.angle-=(rt-lt)*c.turn*tf*dt;
  }

  const nx=c.x+Math.sin(c.angle)*c.speed*dt;
  const nz=c.z+Math.cos(c.angle)*c.speed*dt;

  if(isOnRoad(nx,nz)){c.x=nx;c.z=nz;}
  else{
    const onX=isOnRoad(nx,c.z), onZ=isOnRoad(c.x,nz);
    if(onX){c.x=nx;c.speed*=.8;}
    else if(onZ){c.z=nz;c.speed*=.8;}
    else{
      c.speed*=-.3;
      rd.shake=1.5;
      c.hp=Math.max(0,c.hp-8);
      PS.spawnSparks(c.x,.3,c.z,new THREE.Color(c.color));
    }
  }

  // Car-car collision
  rd.aiCars.forEach(ai=>{
    const dx=c.x-ai.x, dz=c.z-ai.z;
    const d2=dx*dx+dz*dz;
    if(d2<16&&d2>0){
      const d=Math.sqrt(d2), push=(4-d)/4;
      c.x+=dx/d*push*3; c.z+=dz/d*push*3;
      ai.x-=dx/d*push*2; ai.z-=dz/d*push*2;
      c.speed*=Math.max(.45,1-push*.7);
      ai.speed*=Math.max(.55,1-push*.5);
      if(push>.5){c.hp=Math.max(0,c.hp-3);rd.shake=.8;PS.spawnSparks(c.x,.3,c.z,new THREE.Color(0xffd600));}
    }
  });

  // Skid marks
  if((dn&&Math.abs(c.speed)>5)||(Math.abs(rt-lt)>0&&Math.abs(c.speed)>15)){
    if(!c._lastSkid||Math.hypot(c.x-c._lastSkid.x,c.z-c._lastSkid.z)>1.5){
      addSkid(c);
      c._lastSkid={x:c.x,z:c.z};
    }
  } else c._lastSkid=null;

  c.mesh.position.set(c.x,0,c.z);
  c.mesh.rotation.y=c.angle;

  // Spin wheels
  c._wheels.forEach(w=>{w.rotation.x-=c.speed*dt*.5;});

  // Lean on corners
  c.mesh.rotation.z=(lt-rt)*Math.min(1,Math.abs(c.speed)/c.maxSpd)*.06;
  c.mesh.rotation.x=-Math.min(1,c.speed/c.maxSpd)*.04;

  updateLap(c,ts);
}

function updateAI(ai,dt,ts){
  if(ai.finished) return;
  const wps=rd.tDef.waypoints;
  const wp=wps[ai.wpIdx%wps.length];
  const dx=wp.x-ai.x, dz=wp.z-ai.z;
  const d=Math.sqrt(dx*dx+dz*dz);
  if(d<4) ai.wpIdx=(ai.wpIdx+1)%wps.length;

  // Target angle — Three.js uses Y rotation, angle=0 means +Z
  const ta=Math.atan2(dx,dz);
  let da=ta-ai.angle;
  while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
  ai.angle+=Math.sign(da)*Math.min(Math.abs(da),ai.turn*dt*3.2);

  // Separation from other cars
  rd.allCars.forEach(other=>{
    if(other===ai) return;
    const sdx=ai.x-other.x, sdz=ai.z-other.z;
    const sd=Math.sqrt(sdx*sdx+sdz*sdz);
    if(sd<3.5&&sd>0){
      const push=(3.5-sd)/3.5;
      ai.x+=sdx/sd*push*4*dt;
      ai.z+=sdz/sd*push*4*dt;
      ai.speed*=Math.max(.55,1-push*.5);
    }
  });

  // Rubber band
  const pP=rd.player.lap*10000+rd.player.cpIdx*100;
  const aP=ai.lap*10000+ai.cpIdx*100;
  let top=ai.maxSpd;
  if(pP-aP>800) top*=1.22;
  if(pP-aP<-600) top*=.75;
  const turnAmt=Math.abs(da);
  if(turnAmt>.8) top*=Math.max(.45,1-turnAmt*.45);

  ai.speed=Math.min(ai.speed+ai.accel*dt,top);

  const nx=ai.x+Math.sin(ai.angle)*ai.speed*dt;
  const nz=ai.z+Math.cos(ai.angle)*ai.speed*dt;

  if(isOnRoad(nx,nz)){ai.x=nx;ai.z=nz;}
  else{
    if(isOnRoad(nx,ai.z)){ai.x=nx;ai.speed*=.7;}
    else if(isOnRoad(ai.x,nz)){ai.z=nz;ai.speed*=.7;}
    else{ai.speed*=-.15;ai.angle+=.4;}
  }

  // Anti-stuck
  if(ts-ai._stuckCheck.t>3500){
    const md=Math.hypot(ai.x-ai._stuckCheck.x,ai.z-ai._stuckCheck.z);
    if(md<1.5){
      ai.wpIdx=(ai.wpIdx+1)%wps.length;
      const nw=wps[ai.wpIdx]; ai.x=nw.x; ai.z=nw.z; ai.speed=0;
    }
    ai._stuckCheck={x:ai.x,z:ai.z,t:ts};
  }

  ai.mesh.position.set(ai.x,0,ai.z);
  ai.mesh.rotation.y=ai.angle;
  ai._wheels.forEach(w=>{w.rotation.x-=ai.speed*dt*.5;});

  updateLap(ai,ts);
}

function addSkid(car){
  const geo=new THREE.PlaneGeometry(2.2,.5);
  const mat=new THREE.MeshBasicMaterial({color:0x000000,transparent:true,opacity:.45,depthWrite:false});
  const m=new THREE.Mesh(geo,mat);
  m.rotation.x=-Math.PI/2;
  m.position.set(car.x,.02,car.z);
  m.rotation.z=-car.angle;
  scene.add(m);
  // Fade over time
  let life=6;
  const fade=setInterval(()=>{
    life-=.5;
    if(life<=0||!m.parent){clearInterval(fade);scene.remove(m);return;}
    m.material.opacity=.45*(life/6);
  },500);
}

function updateLap(car,ts){
  if(car.finished) return;
  const t=rd.tDef;
  const cp=t.checkpoints[car.cpIdx];
  if(cp){
    const dx=car.x-cp.x, dz=car.z-cp.z;
    if(dx*dx+dz*dz<cp.r*cp.r) car.cpIdx++;
  }
  if(car.cpIdx>=t.checkpoints.length){
    const fl=t.finishZone;
    const dx=car.x-fl.x, dz=car.z-fl.z;
    if(dx*dx+dz*dz<fl.r*fl.r){
      car.cpIdx=0;
      finishLap(car,ts,t);
    }
  }
}

function finishLap(car,ts,tDef){
  const lt=(ts-car.lapStart)/1000;
  car.lapTimes.push(lt);
  if(lt<car.bestLap) car.bestLap=lt;
  car.lapStart=ts;
  car.lap++;
  if(car.isPlayer) showLapBanner(car.lap-1,lt,tDef.laps);
  if(car.lap>tDef.laps+1&&!car.finished){
    car.finished=true;
    car.finishPos=rd.finishOrder.length+1;
    rd.finishOrder.push(car);
    if(car.isPlayer){rd.finished=true;setTimeout(showResults,2000);}
  }
}

function showLapBanner(lap,time,total){
  if(lap>total) return;
  const el=document.getElementById('lapfl');
  el.textContent=lap===total?'🏁 FINAL LAP':`LAP ${lap} — ${fmt(time)}`;
  el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2500);
}

const camOffset=new THREE.Vector3();
const camTarget=new THREE.Vector3();
function updateCamera(dt){
  if(!rd) return;
  const p=rd.player;
  const shk=rd.shake>0?(Math.random()-.5)*rd.shake*.4:0;
  // Chase camera behind car
  const dist=12, height=5;
  const bx=-Math.sin(p.angle)*dist, bz=-Math.cos(p.angle)*dist;
  camOffset.set(p.x+bx+shk, height+shk*.3, p.z+bz);
  camera.position.lerp(camOffset,.12);
  camTarget.set(p.x+Math.sin(p.angle)*8, 1.5, p.z+Math.cos(p.angle)*8);
  camera.lookAt(camTarget);
}

// SPEEDOMETER
// ═══════════════════════════════════════════════════════
function drawSpeedometer(speed, maxSpd){
  const c=document.getElementById('spd-ring');
  const ctx=c.getContext('2d');
  const W=c.width, H=c.height, cx=W/2, cy=H/2, r=44;
  ctx.clearRect(0,0,W,H);

  // BG arc
  ctx.strokeStyle='rgba(0,229,255,.1)';
  ctx.lineWidth=8;
  ctx.beginPath();
  ctx.arc(cx,cy,r,-Math.PI*.8,Math.PI*.8);
  ctx.stroke();

  // Value arc
  const t=Math.min(1,speed/maxSpd);
  const clr=t>.8?'#ff1744':t>.5?'#ffd600':'#00e5ff';
  ctx.strokeStyle=clr;
  ctx.shadowColor=clr;ctx.shadowBlur=12;
  ctx.lineWidth=8;
  ctx.beginPath();
  ctx.arc(cx,cy,r,-Math.PI*.8,-Math.PI*.8+t*Math.PI*1.6);
  ctx.stroke();
  ctx.shadowBlur=0;

  // Speed text
  ctx.fillStyle=clr;
  ctx.font='bold 18px Orbitron,sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(Math.round(speed*10),cx,cy-4);
  ctx.font='9px Orbitron,sans-serif';
  ctx.fillStyle='rgba(0,229,255,.4)';
  ctx.fillText('km/h',cx,cy+14);
}

// MINIMAP
// ═══════════════════════════════════════════════════════
function drawMinimap(){
  if(!rd) return;
  const t=rd.tDef;
  const MW=100, MH=100;
  // World bounds ~200×200
  const SX=MW/200, SZ=MH/200;
  const ox=100, oz=100; // center offset

  mmCtx.clearRect(0,0,MW,MH);
  mmCtx.save();
  mmCtx.beginPath();mmCtx.arc(50,50,49,0,Math.PI*2);mmCtx.clip();

  mmCtx.fillStyle='rgba(4,8,20,.85)';mmCtx.fillRect(0,0,MW,MH);

  // Road
  mmCtx.fillStyle='#1e2535';
  t.segs.forEach(s=>{
    mmCtx.fillRect((s.x-s.w/2+ox)*SX,(s.z-s.d/2+oz)*SZ,s.w*SX,s.d*SZ);
  });

  // AI
  rd.aiCars.forEach(ai=>{
    mmCtx.fillStyle='#'+ai.color.toString(16).padStart(6,'0');
    mmCtx.beginPath();mmCtx.arc((ai.x+ox)*SX,(ai.z+oz)*SZ,3,0,Math.PI*2);mmCtx.fill();
  });

  // Player
  mmCtx.shadowColor='#fff';mmCtx.shadowBlur=5;
  mmCtx.fillStyle='#fff';
  mmCtx.beginPath();mmCtx.arc((rd.player.x+ox)*SX,(rd.player.z+oz)*SZ,4.5,0,Math.PI*2);mmCtx.fill();
  mmCtx.shadowBlur=0;
  mmCtx.restore();

  // Border
  mmCtx.strokeStyle='rgba(0,229,255,.35)';mmCtx.lineWidth=1.5;
  mmCtx.beginPath();mmCtx.arc(50,50,49,0,Math.PI*2);mmCtx.stroke();
}

// HUD UPDATE
// ═══════════════════════════════════════════════════════
function getRacePos(){
  const prog=c=>c.finished?-c.finishPos*99999:c.lap*10000+c.cpIdx*100+c.speed*.01;
  return [...rd.allCars].sort((a,b)=>prog(b)-prog(a)).indexOf(rd.player);
}

function updateHUD(ts){
  if(!rd) return;
  const p=rd.player;
  const t=rd.tDef;
  const elapsed=(ts-p.lapStart)/1000;
  const total=(ts-rd.startTime)/1000;

  document.getElementById('h-lap').textContent=`${Math.min(p.lap,t.laps)}/${t.laps}`;
  document.getElementById('h-lt').textContent=fmt(elapsed);
  document.getElementById('h-bl').textContent=p.bestLap===Infinity?'--:--.-':fmt(p.bestLap);
  document.getElementById('h-tt').textContent=fmt(total);

  const pos=getRacePos();
  document.getElementById('h-pos').textContent=POSITIONS[pos]||(pos+1)+'th';

  const spd=Math.abs(p.speed)*10;
  document.getElementById('h-spd').innerHTML=`${Math.round(spd)}<span style="font-size:.5rem;font-weight:400;"> km/h</span>`;
  drawSpeedometer(spd,p.maxSpd*10);

  const np=Math.round(p.nitro);
  document.getElementById('nbar').style.width=np+'%';
  document.getElementById('h-np').textContent=np+'%';

  const hp=Math.round(p.hp/p.maxHP*100);
  const hfill=document.getElementById('hbar');
  hfill.style.width=hp+'%';
  hfill.style.background=hp>50?'linear-gradient(90deg,#ff1744,#ff6d00)':
    hp>25?'linear-gradient(90deg,#ff6d00,#ffd600)':'#ff1744';
  document.getElementById('h-hp').textContent=hp+'%';

  // Gear (fake)
  const g=Math.min(6,Math.max(1,Math.ceil(spd/50)));
  document.getElementById('gearbox').textContent=p.speed<0?'R':g;
}

function fmt(t){
  const m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.floor((t%1)*10);
  return `${m}:${String(s).padStart(2,'0')}.${ms}`;
}

function showResults(){
  gState='results';
  document.getElementById('hud').style.display='none';
  document.getElementById('mctrl').classList.remove('show');

  const fo=rd.finishOrder;
  const rem=rd.allCars.filter(c=>!c.finished);
  rem.sort((a,b)=>(b.lap*1000+b.cpIdx)-(a.lap*1000+a.cpIdx));
  const final=[...fo,...rem];

  const pEl=document.getElementById('podium');
  pEl.innerHTML='';
  [[1,0,'p1','#ffd600'],[2,1,'p2','#ccc'],[3,2,'p3','#cd7f32']].forEach(([rank,i,cls,clr])=>{
    const car=final[i];
    if(!car) return;
    const d=document.createElement('div');
    d.className=`pod ${cls}`;
    const hexStr='#'+car.color.toString(16).padStart(6,'0');
    d.innerHTML=`<div class="prank" style="color:${clr}">${rank}</div>
      <div style="width:24px;height:16px;background:${hexStr};margin:8px auto;border-radius:2px;"></div>
      <div class="pname">${car.name}</div>
      <div class="ptime">${car.bestLap===Infinity?'--':fmt(car.bestLap)}</div>`;
    pEl.appendChild(d);
  });

  const pp=final.indexOf(rd.player);
  const tt=(performance.now()-rd.startTime)/1000;
  document.getElementById('rstats').innerHTML=`
    <div class="rbox"><div class="rlbl">YOUR POSITION</div><div class="rval">${POSITIONS[pp]||(pp+1)+'th'}</div></div>
    <div class="rbox"><div class="rlbl">TOTAL TIME</div><div class="rval">${fmt(tt)}</div></div>
    <div class="rbox"><div class="rlbl">BEST LAP</div><div class="rval">${rd.player.bestLap===Infinity?'N/A':fmt(rd.player.bestLap)}</div></div>
    <div class="rbox"><div class="rlbl">TOP SPEED</div><div class="rval">${Math.round(rd.player.maxSpd*10)} km/h</div></div>`;
  document.getElementById('mResults').classList.remove('off');
}

function pauseGame(){
  if(gState!=='racing') return;
  gState='paused';

}
function resumeGame(){
  document.getElementById('mPause').classList.add('off');
  gState='racing'; lastT=performance.now();
  if(!raf) raf=requestAnimationFrame(loop);
}
function restartRace(){
  cleanup(); setTimeout(startRace,100);
}
function quitMenu(){
  cleanup();
  document.getElementById('sMenu').classList.remove('off');
  gState='menu';
  // Show menu background
  scene.background=new THREE.Color(0x060c18);
  scene.fog=null;
  menuLoop();
}
function cleanup(){
  if(raf){cancelAnimationFrame(raf);raf=null;}
  gState='menu'; rd=null;
  document.getElementById('hud').style.display='none';
  document.getElementById('mctrl').classList.remove('show');
  document.getElementById('mPause').classList.add('off');
  document.getElementById('mResults').classList.add('off');

}

let menuRaf=null;
function menuLoop(){
  if(menuRaf) return;
  scene.background=new THREE.Color(0x060c18);
  // Simple rotating camera
  function frame(ts){
    if(gState!=='menu'){menuRaf=null;return;}
    const t=ts*.0003;
    camera.position.set(Math.sin(t)*30,12,Math.cos(t)*30);
    camera.lookAt(0,0,0);
    renderer.render(scene,camera);
    menuRaf=requestAnimationFrame(frame);
  }
  menuRaf=requestAnimationFrame(frame);
}

function buildTrackCards(){
  const g=document.getElementById('tgrid');
  g.innerHTML='';
  TRACKS.forEach((t,i)=>{
    const d=document.createElement('div');
    d.className='tcard'+(i===selTrack?' sel':'');
    d.onclick=()=>{selTrack=i;document.querySelectorAll('.tcard').forEach((c,j)=>c.classList.toggle('sel',j===i));};
    const cv=document.createElement('canvas');
    cv.className='tprev';cv.width=230;cv.height=120;
    drawTrackThumb(cv,t);
    d.appendChild(cv);
    d.innerHTML+=`<div class="tcinfo">
      <div class="tcname">${t.name}</div>
      <div class="tcdiff ${t.diffCls}">${t.diff.toUpperCase()}</div>
      <div class="tcmeta"><span>${t.laps} LAPS</span><span>4 RACERS</span></div>
    </div>`;
    g.appendChild(d);
  });
}

function drawTrackThumb(cv,t){
  const c=cv.getContext('2d');
  const W=230,H=120;
  // Scale: world ~200×160 → preview
  const SX=W/200, SZ=H/160, ox=100, oz=80;
  c.fillStyle=t.skyClr?'#'+t.skyClr.toString(16).padStart(6,'0'):'#060c18';
  c.fillRect(0,0,W,H);
  c.fillStyle='#1e2535';
  t.segs.forEach(s=>c.fillRect((s.x-s.w/2+ox)*SX,(s.z-s.d/2+oz)*SZ,s.w*SX,s.d*SZ));
  const curbHex='#'+t.curbClr.toString(16).padStart(6,'0');
  c.strokeStyle=curbHex;c.lineWidth=1.2;
  t.segs.forEach(s=>c.strokeRect((s.x-s.w/2+ox)*SX,(s.z-s.d/2+oz)*SZ,s.w*SX,s.d*SZ));
  // Waypoints
  c.fillStyle='rgba(255,255,255,.25)';
  t.waypoints.forEach(w=>{
    c.beginPath();c.arc((w.x+ox)*SX,(w.z+oz)*SZ,1.5,0,Math.PI*2);c.fill();
  });
  // Start
  const fl=t.finishZone;
  c.fillStyle=curbHex;
  c.beginPath();c.arc((fl.x+ox)*SX,(fl.z+oz)*SZ,4,0,Math.PI*2);c.fill();
}

function buildCarCards(){
  const g=document.getElementById('cgrid');
  g.innerHTML='';
  CARS_DATA.forEach((car,i)=>{
    const d=document.createElement('div');
    d.className='ccard'+(i===selCar?' sel':'');
    d.onclick=()=>{selCar=i;document.querySelectorAll('.ccard').forEach((c,j)=>c.classList.toggle('sel',j===i));};
    const cv=document.createElement('canvas');

    const labs={spd:'SPEED',acc:'ACCEL',han:'HANDL',arm:'ARMOR'};
    const clrs={spd:'#'+car.hex.toString(16).padStart(6,'0'),acc:'#ffd600',han:'#76ff03',arm:'#90a4ae'};
    ['spd','acc','han','arm'].forEach(s=>{
      const row=document.createElement('div');
      row.className='srow';
      row.innerHTML=`<span class="slbl">${labs[s]}</span>
        <div class="str"><div class="sfill" style="width:${car[s]*10}%;background:${clrs[s]};"></div></div>`;
      d.appendChild(row);

function drawCarIcon2D(cv,car){
  const c=cv.getContext('2d');
  c.clearRect(0,0,145,75);
  const hex='#'+car.hex.toString(16).padStart(6,'0');
  const bodyHex='#'+car.body.toString(16).padStart(6,'0');
  c.save();c.translate(72,38);
  // Body
  const g=c.createLinearGradient(-12,0,12,0);
  g.addColorStop(0,bodyHex);g.addColorStop(.5,hex);g.addColorStop(1,bodyHex);
  c.fillStyle=g;
  c.beginPath();
  c.moveTo(-10,-20);c.lineTo(10,-20);c.lineTo(12,0);
  c.lineTo(10,20);c.lineTo(-10,20);c.lineTo(-12,0);
  c.closePath();c.fill();
  // Cabin
  c.fillStyle=bodyHex;c.fillRect(-7,-12,14,18);
  // Windshield
  c.fillStyle='rgba(130,220,255,.45)';c.fillRect(-6,-12,12,8);
  // Lights
  c.fillStyle='rgba(255,255,255,.9)';c.fillRect(-8,-21,6,3);c.fillRect(2,-21,6,3);
  c.fillStyle='rgba(255,30,60,.9)';c.fillRect(-8,18,6,3);c.fillRect(2,18,6,3);
  // Wheels
  c.fillStyle='#111';
  [[-14,-12],[-14,6],[9,-12],[9,6]].forEach(([wx,wy])=>c.fillRect(wx,wy,5,9));
  c.restore();
}

function showHelp(){
  alert('🏎️ NITRO RUSH 3D CONTROLS\n\n⬆ W / Arrow Up — Accelerate\n⬇ S / Arrow Down — Brake\n◀ A / Arrow Left — Turn Left\n▶ D / Arrow Right — Turn Right\nSpace — NITRO Boost\nEscape — Pause\n\n💡 Hit all checkpoints (cyan rings) to complete each lap!\nNitro recharges when not in use.');
}

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════
const KM={ArrowUp:'up',KeyW:'up',ArrowDown:'dn',KeyS:'dn',
  ArrowLeft:'lt',KeyA:'lt',ArrowRight:'rt',KeyD:'rt',Space:'nitro'};
window.addEventListener('keydown',e=>{
  if(KM[e.code]!==undefined){keys[KM[e.code]]=1;if(e.code==='Space')e.preventDefault();}
  if(e.code==='Escape'){if(gState==='racing')pauseGame();else if(gState==='paused')resumeGame();}
});
window.addEventListener('keyup',e=>{if(KM[e.code]!==undefined)keys[KM[e.code]]=0;});

function mBtn(id,key){
  const el=document.getElementById(id);
  const on=e=>{e.preventDefault();keys[key]=1;el.classList.add('act');};
  const off=e=>{e.preventDefault();keys[key]=0;el.classList.remove('act');};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
}
mBtn('mup','up');mBtn('mdn','dn');mBtn('mlt','lt');mBtn('mrt','rt');mBtn('mnt','nitro');
document.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
function isMob(){return 'ontouchstart' in window||navigator.maxTouchPoints>0;}

// ═══════════════════════════════════════════════════════
// INIT — build a preview scene for the menu
// ═══════════════════════════════════════════════════════
function initMenuScene(){
  while(scene.children.length) scene.remove(scene.children[0]);
  scene.background=new THREE.Color(0x060c18);
  scene.fog=new THREE.FogExp2(0x060c18,.015);
  const amb=new THREE.AmbientLight(0x334466,1);scene.add(amb);
  const dir=new THREE.DirectionalLight(0x8888ff,.8);dir.position.set(20,30,10);scene.add(dir);
  // Build track 0 as preview
  const tMesh=buildTrack(TRACKS[0]);
  scene.add(tMesh);
  // Place a demo car
  const demo=buildCarMesh(CARS_DATA[0].hex,CARS_DATA[0].body);
  demo.position.set(-30,0,-55);
  scene.add(demo);
  menuLoop();
}

initMenuScene();
buildTrackCards();
buildCarCards();
